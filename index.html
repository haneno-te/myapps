<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Apps">
<meta name="theme-color" content="#0f0f0f">
<title>My Apps</title>
<link rel="apple-touch-icon" id="appicon" href="#">
<script>
  window.addEventListener('load', () => {
    const canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath();
    ctx.roundRect(0,0,512,512,80);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1.5;
    for(let i=0;i<=512;i+=40){
      ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke();
    }
    ctx.font = '300px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('📲', 256, 272);
    document.getElementById('appicon').href = canvas.toDataURL('image/png');
  });
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent2: #60d0f0;
    --accent-life: #f0a060;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 52px 20px 48px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 44px;
    position: relative;
    z-index: 1;
    animation: fadeDown 0.6s ease both;
  }

  .logo-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(38px, 10vw, 60px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
  }

  /* セクション */
  .sections {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    gap: 36px;
    position: relative;
    z-index: 1;
  }

  .section {}

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
  }

  .section-icon { font-size: 20px; }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .section-title.work { color: var(--accent); }
  .section-title.life { color: var(--accent-life); }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
  }

  .app-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 18px;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    animation: fadeUp 0.5s ease both;
    -webkit-user-select: none;
    user-select: none;
  }

  .app-card::before {
    content:'';
    position:absolute;
    top:0;left:0;right:0;
    height:2px;
    opacity:0;
    transition:opacity 0.18s ease;
  }

  .work-section .app-card::before {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .life-section .app-card::before {
    background: linear-gradient(90deg, var(--accent-life), #f060a0);
  }

  .app-card:hover, .app-card:active {
    transform: translateY(-3px);
    border-color: #3a3a3a;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }

  .app-card:hover::before, .app-card:active::before { opacity:1; }

  .app-card.coming {
    opacity:0.4;
    cursor:default;
    pointer-events:none;
  }

  .card-icon { font-size:26px; margin-bottom:12px; display:block; }
  .card-name { font-size:16px; font-weight:700; margin-bottom:4px; color:var(--text); }
  .card-desc { font-size:11px; color:var(--muted); line-height:1.6; }

  .card-badge {
    position:absolute;
    top:16px; right:16px;
    font-family:'DM Mono',monospace;
    font-size:9px;
    letter-spacing:0.08em;
    padding:3px 8px;
    border-radius:20px;
  }

  .work-section .card-badge {
    background:rgba(200,240,96,0.1);
    color:var(--accent);
    border:1px solid rgba(200,240,96,0.2);
  }

  .life-section .card-badge {
    background:rgba(240,160,96,0.1);
    color:var(--accent-life);
    border:1px solid rgba(240,160,96,0.2);
  }

  .card-badge.soon {
    background:rgba(100,100,100,0.1) !important;
    color:var(--muted) !important;
    border:1px solid var(--border) !important;
  }

  .arrow {
    position:absolute;
    bottom:18px; right:18px;
    font-size:14px;
    color:var(--muted);
    transition:color 0.18s, transform 0.18s;
  }

  .app-card:hover .arrow, .app-card:active .arrow {
    transform:translate(2px,-2px);
  }

  .work-section .app-card:hover .arrow,
  .work-section .app-card:active .arrow { color:var(--accent); }

  .life-section .app-card:hover .arrow,
  .life-section .app-card:active .arrow { color:var(--accent-life); }

  .hint {
    margin-top:36px;
    position:relative;
    z-index:1;
    animation:fadeUp 0.5s 0.6s ease both;
    text-align:center;
  }

  .hint-inner {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:12px;
    padding:9px 14px;
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:var(--muted);
    letter-spacing:0.05em;
  }

  .hint-inner span { color:var(--accent2); }

  footer {
    margin-top:28px;
    font-family:'DM Mono',monospace;
    font-size:10px;
    color:#333;
    letter-spacing:0.15em;
    text-align:center;
    position:relative;
    z-index:1;
    animation:fadeUp 0.5s 0.7s ease both;
  }

  @keyframes fadeDown {
    from{opacity:0;transform:translateY(-20px);}
    to{opacity:1;transform:translateY(0);}
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
  }

  @media (display-mode: standalone) {
    .hint { display:none; }
    body { padding-top:72px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-label">haneno-te</div>
  <h1>My <span>Apps</span></h1>
  <div class="subtitle">// personal toolkit 📲</div>
</header>

<div class="sections">

  <!-- WORK -->
  <div class="section work-section">
    <div class="section-header">
      <span class="section-icon">🧑‍💻</span>
      <span class="section-title work">Work</span>
      <div class="section-line"></div>
    </div>
    <div class="grid">
      <a class="app-card" href="https://haneno-te.github.io/harikyu-app/" target="_blank">
        <span class="card-icon">🪡</span>
        <div class="card-badge">稼働中</div>
        <div class="card-name">はりきゅう管理</div>
        <div class="card-desc">訪問スケジュール・施術記録・患者管理</div>
        <div class="arrow">↗</div>
      </a>
      <a class="app-card" href="https://haneno-te.github.io/nippou-app/" target="_blank">
        <span class="card-icon">📋</span>
        <div class="card-badge">稼働中</div>
        <div class="card-name">日報</div>
        <div class="card-desc">日々の業務記録・サービス提供ログ</div>
        <div class="arrow">↗</div>
      </a>
      <a class="app-card" href="https://haneno-te.github.io/drive-log/" target="_blank">
        <span class="card-icon">🚗</span>
        <div class="card-badge">稼働中</div>
        <div class="card-name">走行距離</div>
        <div class="card-desc">訪問ルートの走行距離・交通費計算</div>
        <div class="arrow">↗</div>
      </a>
    </div>
  </div>

  <!-- LIFE -->
  <div class="section life-section">
    <div class="section-header" style="animation-delay:0.3s">
      <span class="section-icon">🧸</span>
      <span class="section-title life">Life</span>
      <div class="section-line"></div>
    </div>
    <div class="grid">
      <div class="app-card coming">
        <span class="card-icon">💴</span>
        <div class="card-badge soon">coming soon</div>
        <div class="card-name">家計簿</div>
        <div class="card-desc">収支管理・月次レポート</div>
      </div>
    </div>
  </div>

</div>

<div class="hint">
  <div class="hint-inner">
    <span>⎙</span> 共有ボタン →「ホーム画面に追加」でアイコン設置できます
  </div>
</div>

<footer>built with Claude · 2026</footer>

</body>
</html>
